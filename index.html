<!DOCTYPE html>

<head>
    <title>Geometry Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="calculator-container">

        <h1>Geometry Calculator</h1>

        <p style="text-align: center;">Select a shape and a calculation to perform.</p>

        <div>
            <label for="shape">Shape:</label>

            <select id="shape">
                <option>Circle</option>
                <option>Square</option>
                <option>Rectangle</option>
                <option>Triangle</option>
                <option>Pentagon</option>
                <option>Rhombus</option>
                <option>Parallelogram</option>
                <option>Trapezium</option>
                <option>Kite</option>
                <option>Ellipse</option>
                <option>Hexagon</option>
                <option>Heptagon</option>
                <option>Octagon</option>
                <option>Nonagon</option>
                <option>Decagon</option>
                <option>Semicircle</option>
                <option>Sector</option>
                <option>Annulus</option>
            </select>
        </div>

        <br>

        <div>
            <label for="calculation">Calculation:</label>

            <select id="calculation">
            </select>
        </div>

        <br>

        <h2>Inputs</h2>

        <div id="inputs">
        </div>

        <br>

        <button id="calculateBtn">
            Calculate
        </button>

        <h2>Result</h2>

        <p id="result">
            Waiting for calculation...
        </p>

    </div>

    <div id="themeSwitcher">

        <label for="theme">Theme</label>

        <select id="theme">
            <option value="light">Light</option>
            <option value="soft-dark">Soft Dark</option>
            <option value="dark">Dark</option>
        </select>

    </div>
